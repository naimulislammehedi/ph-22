<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tour of DOM</title>

    <link rel="stylesheet" href="./styles/style.css" />

  </head>
  <body>
    <header>
      <h1>This is my header no banner</h1>
    </header>
    <main>
      <section class="songs">
        <h1>Welcome to my DOM</h1>
        <ul>
          <li>Shafayet</li>
          <li class="foreign">Bonobash</li>
          <li id="band">Jalali Set</li>
          <li>Dom de re baba</li>
        </ul>
      </section>

      <section>
        <h1 id="food-title">Foods I Love</h1>
        <ul>
          <li>Rice</li>
          <li>Potato</li>
          <li>Fish</li>
          <li>Lentils</li>
          <li class="foreign">Burger</li>
          <li class="foreign">Pizza</li>
          <li>Hundy</li>
        </ul>
      </section>
    </main>

    

    <script>
      // console.log("Hello from JavaScript");
      // console.log("Hello bole cole gelo");

      // console.log("Document Object Model")

      const student = {
        name: 'Abul mia', 
        id: 121, 
        study: function (subject) {
          console.log('studying subject: ', subject)
        }
      }

      const liCollection = document.getElementsByTagName('li'); 
      console.log(liCollection); 

      for (const li of liCollection) {
        console.log(li)
      }

      // all h1 tags 
      const allHeadings = document.getElementsByTagName('h1'); 
      for (const heading of allHeadings) {
        console.log(heading.innerText); 
      }

      // get by ID 
      const foodTitleH1 = document.getElementById("food-title"); 
      console.log(foodTitleH1.textContent); 

      foodTitleH1.innerHTML = "Foods that make me happy"; 

      const bandElement = document.getElementById("band"); 
      bandElement.innerText = "Jalali Sleeping Band"; 

      // get elements by class name 
      const foreignElements = document.getElementsByName("foreign"); 
      console.log(foreignElements); 

      for (const element of foreignElements) {
        console.log(element.innerText)
      }
      
    </script>
  </body>
</html>
